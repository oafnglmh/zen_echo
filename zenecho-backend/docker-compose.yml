version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: zenecho-postgres
    restart: always
    environment:
      POSTGRES_USER: zenecho
      POSTGRES_PASSWORD: zenecho2407
      POSTGRES_DB: zenecho
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
